<div id="toast" class="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
//  SUPABASE SETUP & DATABASE LAYER
// ══════════════════════════════════════════════════════════════════

// Initialize Supabase client
let sb = null;
let useSupabase = false;

function initSupabase() {
  try {
    if (SUPABASE_URL === 'https://YOUR_PROJECT_ID.supabase.co' || SUPABASE_KEY === 'YOUR_ANON_PUBLIC_KEY') {
      console.warn('FleetDesk: Supabase not configured — running in local demo mode.');
      useSupabase = false;
      return false;
    }
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    useSupabase = true;
    return true;
  } catch(e) {
    console.error('Supabase init failed:', e);
    useSupabase = false;
    return false;
  }
}

// ── DATABASE SCHEMA (run once in Supabase SQL Editor) ─────────────
// Copy-paste the SQL below into Supabase → SQL Editor → Run
/*
────────────────────────────────────────────────────────────────────
CREATE TABLE users (
  id SERIAL PRIMARY KEY,
  username TEXT UNIQUE NOT NULL,
  password TEXT NOT NULL,
  role TEXT NOT NULL CHECK (role IN ('admin','driver','employee')),
  display_name TEXT NOT NULL,
  emp_id TEXT,
  driver_id INTEGER
);

CREATE TABLE drivers (
  id SERIAL PRIMARY KEY,
  name TEXT NOT NULL,
  license TEXT NOT NULL,
  phone TEXT NOT NULL
);

CREATE TABLE employees (
  id SERIAL PRIMARY KEY,
  name TEXT NOT NULL,
  emp_id TEXT UNIQUE NOT NULL,
  dept TEXT,
  phone TEXT
);

CREATE TABLE cars (
  id SERIAL PRIMARY KEY,
  reg TEXT UNIQUE NOT NULL,
  model TEXT NOT NULL,
  color TEXT NOT NULL,
  hex TEXT NOT NULL
);

CREATE TABLE requests (
  id SERIAL PRIMARY KEY,
  emp_id TEXT NOT NULL,
  name TEXT NOT NULL,
  dept TEXT,
  phone TEXT,
  from_loc TEXT NOT NULL,
  to_loc TEXT NOT NULL,
  date DATE NOT NULL,
  pickup_time TEXT NOT NULL,

// ── DB ABSTRACTION LAYER ──────────────────────────────────────────
// All data operations route through here — works with both
// Supabase (live) and local arrays (demo mode).

async function dbGetUsers()     { if(!useSupabase) return USERS; const {data}=await sb.from('users').select('*'); return data||[]; }
async function dbGetDrivers()   { if(!useSupabase) return drivers; const {data}=await sb.from('drivers').select('*').order('name'); return data||[]; }
async function dbGetEmployees() { if(!useSupabase) return employees; const {data}=await sb.from('employees').select('*').order('name'); return data||[]; }
async function dbGetCars()      { if(!useSupabase) return cars; const {data}=await sb.from('cars').select('*').order('model'); return data||[]; }
async function dbGetRequests()  { if(!useSupabase) return requests; const {data}=await sb.from('requests').select('*').order('created_at',{ascending:false}); return data||[]; }

async function dbInsertDriver(d)   { if(!useSupabase){var nd={...d,id:nextDriverId++};drivers.push(nd);return nd;} const {data}=await sb.from('drivers').insert(d).select().single(); return data; }
async function dbInsertEmployee(e) { if(!useSupabase){var ne={...e,id:nextEmpId++};employees.push(ne);return ne;} const {data}=await sb.from('employees').insert(e).select().single(); return data; }
async function dbInsertCar(c)      { if(!useSupabase){var nc={...c,id:nextCarId++};cars.push(nc);return nc;} const {data}=await sb.from('cars').insert(c).select().single(); return data; }
async function dbInsertRequest(r)  { if(!useSupabase){var nr={...r,id:requests.length+1};requests.push(nr);return nr;} const {data}=await sb.from('requests').insert(r).select().single(); return data; }
async function dbInsertUser(u)     { if(!useSupabase){USERS.push({...u,id:'u'+nextUserId++});return u;} const {data}=await sb.from('users').insert(u).select().single(); return data; }

async function dbUpdateRequest(id,updates) {
  if(!useSupabase){var r=requests.find(x=>x.id===id);if(r)Object.assign(r,updates);return r;}
  const {data}=await sb.from('requests').update(updates).eq('id',id).select().single(); return data;
}
async function dbUpdateUser(id,updates) {
  if(!useSupabase){var u=USERS.find(x=>x.id===id);if(u)Object.assign(u,updates);return u;}
  const {data}=await sb.from('users').update(updates).eq('id',id).select().single(); return data;
}
async function dbUpsertUser(matchField,matchVal,userData) {
  if(!useSupabase){
    var u=USERS.find(x=>x[matchField]===matchVal);
    if(u){Object.assign(u,userData);}else{USERS.push({id:'u'+nextUserId++,...userData});}
    return userData;
  }
  const {data}=await sb.from('users').upsert(userData,{onConflict:'username'}).select().single(); return data;
}
async function dbDeleteDriver(id)   { if(!useSupabase){drivers=drivers.filter(d=>d.id!==id);USERS=USERS.filter(u=>(u.driver_id||u.driverId)!==id);return;} await sb.from('drivers').delete().eq('id',id); await sb.from('users').delete().eq('driver_id',id); }
async function dbDeleteEmployee(id) {
  if(!useSupabase){
    var e=employees.find(x=>x.id===id);
    employees=employees.filter(x=>x.id!==id);
    if(e)USERS=USERS.filter(u=>(u.emp_id||u.empId)!==(e.emp_id||e.empId));
    return;
  }
  const e=employees.find(x=>x.id===id);
  await sb.from('employees').delete().eq('id',id);
  if(e) await sb.from('users').delete().eq('emp_id',e.emp_id||e.empId);
}
async function dbDeleteCar(id) { if(!useSupabase){cars=cars.filter(c=>c.id!==id);return;} await sb.from('cars').delete().eq('id',id); }

// Authenticate user against DB
async function dbAuthUser(username, password) {
  if(!useSupabase) {
    return USERS.find(u=>u.username===username&&u.password===password)||null;
  }
  const {data}=await sb.from('users').select('*').eq('username',username).eq('password',password).single();
  return data||null;
}

function normReq(r){

    displayName:u.display_name||u.displayName,

  };
}
function normEmp(e){return{...e,empId:e.emp_id||e.empId};}

async function refreshData(){
  if(!useSupabase) return;
  try{
    const [u,d,e,c,r]=await Promise.all([dbGetUsers(),dbGetDrivers(),dbGetEmployees(),dbGetCars(),dbGetRequests()]);
    liveUsers=u.map(normUser); liveDrivers=d; liveEmployees=e.map(normEmp); liveCars=c; liveRequests=r.map(normReq);
    drivers=liveDrivers; employees=liveEmployees; cars=liveCars; requests=liveRequests; USERS=liveUsers;
  } catch(e){ console.error('refreshData error',e); }
}

function toMins(t){if(!t)return 0;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function tripsOverlap(aS,aE,bS,bE){return toMins(aS)<toMins(bE)&&toMins(aE)>toMins(bS);}
function isDriverBusyInFrame(name,date,pickup,drop,excl){
  return requests.some(r=>{
    var id=r.id, status=r.status, driver=r.driver, rdate=r.date;
    var pt=r.pickupTime||r.pickup_time, dt=r.dropTime||r.drop_time;
    return driver===name&&rdate===date&&status==='assigned'&&id!==excl&&tripsOverlap(pickup,drop,pt,dt);
  });
}

async function doLogin(){
  var btn=document.getElementById('login-btn');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  var u=document.getElementById('l-user').value.trim().toLowerCase();
  var p=document.getElementById('l-pass').value;
  try{
    var user=await dbAuthUser(u,p);
    if(!user){document.getElementById('l-err').style.display='block';if(btn){btn.textContent='Sign In →';btn.disabled=false;}return;}
    currentUser=normUser(user);
    if(useSupabase) await refreshData();
    renderApp();
  } catch(e){
    toast('Login error: '+e.message,'err');
    if(btn){btn.textContent='Sign In →';btn.disabled=false;}
  }
}

function logout(){currentUser=null;renderLogin();}

async function go(id){
  document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));
  var nav=document.getElementById('nav-'+id); if(nav)nav.classList.add('active');
  if(useSupabase) await refreshData();
  var pages={dashboard:renderDash,request:renderRequest,requests:renderReqs,'my-requests':renderMyRequests,'driver-trips':renderDriverTrips,fleet:renderFleet,users:renderUsers,monthly:renderMonthly,reports:renderReports};
  if(pages[id]) await pages[id]();
}

function validateTimes(){
  var p=document.getElementById('f-pickup').value, d=document.getElementById('f-drop').value;
  var w=document.getElementById('time-warn');
  if(p&&d) w.style.display=toMins(d)<=toMins(p)?'block':'none';
}

async function submitReq(){
  var empId=fv('f-empid'), name=fv('f-name'), from=fv('f-from'), to=fv('f-to'), date=fv('f-date'), pickup=fv('f-pickup'), drop=fv('f-drop');
  if(!empId||!name||!from||!to||!date||!pickup||!drop){toast('Fill all required (*) fields','err');return;}
  if(toMins(drop)<=toMins(pickup)){toast('Drop time must be after pickup time','err');return;}
  var btn=document.getElementById('submit-req-btn');
  if(btn){btn.textContent='Submitting…';btn.disabled=true;}
  var month=new Date(date).toLocaleString('default',{month:'long'});
  var rec={emp_id:empId,empId,name,dept:fv('f-dept'),phone:fv('f-phone'),from_loc:from,from,to_loc:to,to,date,pickup_time:pickup,pickupTime:pickup,drop_time:drop,dropTime:drop,notes:fv('f-notes'),status:'pending',driver:'',car:'',est_km:0,estKm:0,actual_km:0,actualKm:0,end_time:'',endTime:'',driver_notes:'',driverNotes:'',decline_reason:'',declineReason:'',month};
  try{
    await dbInsertRequest(rec);
    ['f-dept','f-phone','f-from','f-to','f-date','f-pickup','f-drop','f-notes'].forEach(id=>{var el=document.getElementById(id);if(el)el.value='';});
    toast('Request submitted!','ok');
    if(btn){btn.textContent='Submit Request →';btn.disabled=false;}
  } catch(e){ toast('Error: '+e.message,'err'); if(btn){btn.textContent='Submit Request →';btn.disabled=false;} }
}

function openAssign(id){
  assignTarget=id; var req=requests.find(r=>r.id===id); if(!req)return;
  var pt=req.pickupTime||req.pickup_time, dt=req.dropTime||req.drop_time, fr=req.from||req.from_loc, to=req.to||req.to_loc;
  document.getElementById('assign-info').innerHTML=`<div class="info-box">📍 ${fr} → ${to}<br>📅 ${req.date} &nbsp;·&nbsp; 🕐 ${pt} – ${dt}</div>`;
  document.getElementById('a-driver').innerHTML=drivers.map(d=>{var busy=isDriverBusyInFrame(d.name,req.date,pt,dt,id);return`<option value="${d.name}" class="${busy?'unavailable':'available'}">${busy?'⚠':'✓'} ${d.name}${busy?' — Busy '+pt+'-'+dt:' — Available'}</option>`;}).join('');
  document.getElementById('a-car').innerHTML=cars.map(c=>`<option value="${c.reg}">${c.reg} — ${c.model}</option>`).join('');
  document.getElementById('a-km').value=''; checkConflict(); openModal('assign-modal');
}
function checkConflict(){
  var req=requests.find(r=>r.id===assignTarget); if(!req)return;
  var pt=req.pickupTime||req.pickup_time, dt=req.dropTime||req.drop_time;
  document.getElementById('conflict-warn').style.display=isDriverBusyInFrame(document.getElementById('a-driver').value,req.date,pt,dt,assignTarget)?'block':'none';
}
async function confirmAssign(){
  var req=requests.find(r=>r.id===assignTarget); if(!req)return;
  var d=document.getElementById('a-driver').value, pt=req.pickupTime||req.pickup_time, dt=req.dropTime||req.drop_time;
  if(isDriverBusyInFrame(d,req.date,pt,dt,assignTarget)){toast('Driver is busy during this time frame!','err');return;}
  var btn=document.getElementById('assign-confirm-btn'); if(btn){btn.textContent='Saving…';btn.disabled=true;}
  var month=new Date(req.date).toLocaleString('default',{month:'long'});

function openEditCred(type,idVal){

  var u=null, label='';
  if(type==='emp'){var e=employees.find(x=>(x.empId||x.emp_id)===idVal);u=USERS.find(x=>(x.empId||x.emp_id)===idVal);label=e?e.name+' ('+idVal+')':'';}
  else{var d=drivers.find(x=>x.id===idVal);u=USERS.find(x=>(x.driverId||x.driver_id)===idVal);label=d?d.name:'';}
  document.getElementById('edit-cred-info').innerHTML=`<div class="info-box">Editing login for: <strong>${label}</strong></div>`;
  document.getElementById('ec-username').value=u?u.username:'';
  document.getElementById('ec-password').value=u?u.password:'';
  openModal('edit-cred-modal');

async function saveCredentials(){
  var uname=fv('ec-username').toLowerCase(), pass=document.getElementById('ec-password').value.trim();
  if(!uname||!pass){toast('Username and password required','err');return;}
  var {type,idVal}=editCredTarget;
  var dup=USERS.find(u=>u.username===uname&&((type==='emp'?(u.empId||u.emp_id)!==idVal:(u.driverId||u.driver_id)!==idVal)));
  if(dup){toast('Username already taken','err');return;}
  try{
    if(useSupabase){
      var existing=type==='emp'?USERS.find(x=>(x.emp_id||x.empId)===idVal):USERS.find(x=>(x.driver_id||x.driverId)===idVal);
      if(existing){
        await sb.from('users').update({username:uname,password:pass}).eq('id',existing.id);
      } else {
        var extra=type==='emp'?{emp_id:idVal,driver_id:null}:{driver_id:idVal,emp_id:null};
        var role=type==='emp'?'employee':'driver';
        var dname=type==='emp'?(employees.find(x=>(x.emp_id||x.empId)===idVal)||{}).name:(drivers.find(x=>x.id===idVal)||{}).name||'';
        await sb.from('users').insert({username:uname,password:pass,role,display_name:dname,...extra});
      }
      await refreshData();
    } else {
      var u=type==='emp'?USERS.find(x=>(x.empId||x.emp_id)===idVal):USERS.find(x=>(x.driverId||x.driver_id)===idVal);
      if(u){u.username=uname;u.password=pass;}
      else{
        var role2=type==='emp'?'employee':'driver';
        var nm=type==='emp'?(employees.find(x=>x.empId===idVal||x.emp_id===idVal)||{}).name:(drivers.find(x=>x.id===idVal)||{}).name||'';
        var nr={id:'u'+nextUserId++,username:uname,password:pass,role:role2,displayName:nm,display_name:nm};
        if(type==='emp'){nr.empId=idVal;nr.emp_id=idVal;nr.driverId=null;nr.driver_id=null;}
        else{nr.driverId=idVal;nr.driver_id=idVal;nr.empId=null;nr.emp_id=null;}
        USERS.push(nr);
      }
    }
    closeModal('edit-cred-modal'); await renderUsers(); toast('Credentials updated!','ok');
  } catch(e){ toast('Error: '+e.message,'err'); }
}

  if(!confirm('Remove this employee?'))return;

}

      <div class="ctitle">Car Utilization</div>
      <table class="tbl"><thead><tr><th>Model</th><th>Reg No.</th><th>Colour</th><th>Trips</th><th>Total KM</th></tr></thead>
      <tbody>${cars.map(c=>{var t=done.filter(r=>r.car===c.reg),k=t.reduce((s,r)=>s+(r.actualKm||r.actual_km||0),0);return`<tr><td style="font-weight:600">${c.model}</td><td class="emp-id">${c.reg}</td><td><span class="color-dot" style="background:${c.hex};margin-right:6px"></span>${c.color}</td><td>${t.length}</td><td>${k}</td></tr>`;}).join('')}</tbody>
      </table>
    </div>`);
}

// ══════════════════════════════════════════════════════════════════
//  BOOT — initialise Supabase then render
// ══════════════════════════════════════════════════════════════════
(async function boot(){
  // Show loading spinner
  document.getElementById('root').innerHTML=`<div class="loading-screen"><div class="spinner"></div><div style="font-family:Outfit,sans-serif;font-size:14px;color:var(--text-secondary)">Starting FleetDesk…</div></div>`;

  var configured=initSupabase();

  if(!configured){
    // Not configured — show setup guide briefly then go to demo login
    renderSetupGuide();
    return;
  }

  // Test the connection
  try{
    await refreshData();
    renderLogin();
  } catch(e){
    console.error('Supabase connection failed:',e);
    useSupabase=false;
    toast('Could not connect to Supabase — running in demo mode','warn');
    renderLogin();
  }
})();
</script>
</body>
</html>
