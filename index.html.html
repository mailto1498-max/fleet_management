.logo-area{padding:1.8rem 1.4rem 1.4rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-icon{width:38px;height:38px;background:var(--accent-grad);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:.7rem;box-shadow:0 4px 14px rgba(79,114,227,0.4)}
.logo-icon svg{width:20px;height:20px;fill:white}
.logo-name{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:var(--text-light);letter-spacing:.3px}
.logo-sub{font-size:11px;color:var(--text-light2);margin-top:2px}
.nav-section{padding:.6rem 0;overflow-y:auto;flex:1}

.nav{display:flex;align-items:center;gap:10px;padding:10px 1.2rem 10px 1.4rem;font-size:13px;color:var(--text-light2);cursor:pointer;border-radius:10px;margin:1px 10px;transition:all .2s;position:relative}
.nav:hover{background:rgba(255,255,255,0.08);color:var(--text-light)}
.nav.active{background:rgba(255,255,255,0.14);color:#fff;font-weight:500;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.12)}
.nav-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.07);font-size:14px}
.nav.active .nav-icon{background:var(--accent-grad);box-shadow:0 3px 10px rgba(79,114,227,0.35)}
.nav-pip{width:5px;height:5px;border-radius:50%;background:var(--accent2);margin-left:auto;display:none}
.nav.active .nav-pip{display:block}
.user-bar{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.08)}
.user-avatar{width:34px;height:34px;border-radius:10px;background:var(--accent-grad);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.avatar-emp{background:linear-gradient(135deg,#3dbf8a,#5dd4a2)}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:.7rem}
.user-name{font-size:13px;font-weight:600;color:var(--text-light)}
.user-role-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.role-admin{background:rgba(245,158,66,0.25);color:#fbbf6e}
.role-employee{background:rgba(61,191,138,0.2);color:#5dd4a2}
.role-driver{background:rgba(79,114,227,0.25);color:#7c9ff7}
.btn-logout{width:100%;font-size:11px;font-weight:500;padding:7px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,0.12);color:#fff}
.main{flex:1;overflow-y:auto;padding:2rem 2rem 2rem 1.75rem;position:relative;z-index:1}
.ptitle{font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:.3rem;letter-spacing:-.3px}
.psubtitle{font-size:13px;color:var(--text-secondary);margin-bottom:1.75rem}
.page{display:none}.page.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.glass-card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:1.5rem;margin-bottom:1.25rem}
.ctitle{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:1.1rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
.scard{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:1.25rem 1.4rem;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.scard:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(99,115,170,0.16)}
.scard-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.scard-label{font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.8px}
.scard-val{font-family:'Outfit',sans-serif;font-size:26px;font-weight:700;color:var(--text-primary);line-height:1}
.scard-sub{font-size:11px;color:var(--text-muted);margin-top:.35rem}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:0}
label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.7px}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;border-radius:10px;border:1.5px solid var(--border);padding:10px 13px;background:rgba(255,255,255,0.8);color:var(--text-primary);width:100%;transition:border-color .2s,box-shadow .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,114,227,0.12)}
textarea{resize:vertical;min-height:60px}
input::placeholder{color:var(--text-muted)}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:9px 20px;border-radius:10px;cursor:pointer;border:none;transition:all .2s;letter-spacing:.2px}
.btn-primary{background:var(--accent-grad);color:#fff;box-shadow:0 4px 14px rgba(79,114,227,0.32)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(79,114,227,0.44);transform:translateY(-1px)}
.btn-danger{background:var(--danger-grad);color:#fff;box-shadow:0 4px 14px rgba(224,92,106,0.28)}
.btn-danger:hover{box-shadow:0 6px 20px rgba(224,92,106,0.4);transform:translateY(-1px)}
.btn-success{background:var(--success-grad);color:#fff;box-shadow:0 4px 14px rgba(61,191,138,0.28)}
.btn-success:hover{box-shadow:0 6px 20px rgba(61,191,138,0.4);transform:translateY(-1px)}
.btn-ghost{background:rgba(79,114,227,0.08);color:var(--accent);border:1.5px solid rgba(79,114,227,0.2)}
.btn-ghost:hover{background:rgba(79,114,227,0.15)}
.btn-warn{background:linear-gradient(135deg,#f59e42,#fbbf6e);color:#fff;box-shadow:0 4px 14px rgba(245,158,66,0.3)}
.btn-sm{font-size:11px;padding:6px 13px;border-radius:8px}
.btn-block{width:100%;margin-top:6px}
.btn-icon{width:32px;height:32px;padding:0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--radius-pill);letter-spacing:.3px}
.b-pending{background:rgba(245,158,66,0.14);color:#c77a10;border:1px solid rgba(245,158,66,0.25)}
.b-assigned{background:rgba(79,114,227,0.12);color:#3a5bcc;border:1px solid rgba(79,114,227,0.22)}
.b-completed{background:rgba(61,191,138,0.12);color:#27936a;border:1px solid rgba(61,191,138,0.25)}
.b-declined{background:rgba(224,92,106,0.11);color:#b83a49;border:1px solid rgba(224,92,106,0.22)}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--text-secondary);padding:8px 12px;border-bottom:1.5px solid var(--border);text-transform:uppercase;letter-spacing:.8px}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(99,115,170,0.07);color:var(--text-primary);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(79,114,227,0.03)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,36,72,0.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center;z-index:1000}
.modal-overlay.open{display:flex}
.modal{background:rgba(255,255,255,0.97);border-radius:20px;padding:1.75rem;width:420px;border:1px solid var(--glass-border);box-shadow:0 24px 64px rgba(26,36,72,0.22);animation:modalIn .25s ease;max-height:90vh;overflow-y:auto}

.modal-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;margin-bottom:1.2rem;color:var(--text-primary)}
.modal-footer{display:flex;gap:8px;margin-top:1.2rem}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e8ebf5 0%,#dde3f5 100%);position:relative;overflow:hidden}

.login-logo{width:52px;height:52px;background:var(--accent-grad);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1.2rem;box-shadow:0 8px 24px rgba(79,114,227,0.35)}
.login-logo svg{width:28px;height:28px;fill:white}
.login-title{font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:.25rem}
.login-sub{font-size:13px;color:var(--text-secondary);margin-bottom:1.8rem}
.login-err{font-size:12px;color:var(--danger);margin-top:8px;display:none;background:rgba(224,92,106,0.08);padding:8px 12px;border-radius:8px;border:1px solid rgba(224,92,106,0.2)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.empty-state{text-align:center;padding:2rem;color:var(--text-secondary)}

.toast{display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:600;padding:11px 22px;border-radius:var(--radius-pill);z-index:9999;white-space:nowrap;box-shadow:0 8px 24px rgba(26,36,72,0.22)}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-ok{background:var(--accent-grad);color:#fff}
.toast-err{background:var(--danger-grad);color:#fff}
.toast-warn{background:linear-gradient(135deg,#f59e42,#fbbf6e);color:#fff}
.pass-field{position:relative}
.pass-field input{padding-right:38px}
.pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:14px;background:none;border:none;color:var(--text-muted)}
.divider{height:1px;background:var(--border);margin:.9rem 0}
.cred-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(79,114,227,0.08);border:1px solid rgba(79,114,227,0.18);border-radius:7px;padding:3px 8px;font-size:10px;color:var(--accent);font-family:monospace}
.time-range-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(61,191,138,0.1);border:1px solid rgba(61,191,138,0.2);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;color:#27936a}
.no-results{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:12px}
select option.unavailable{color:var(--danger);font-weight:600}
select option.available{color:#27936a}
</style>

// ── TIME-FRAME CONFLICT ───────────────────────────────────────────
function toMins(t){if(!t)return 0;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function tripsOverlap(aS,aE,bS,bE){return toMins(aS)<toMins(bE)&&toMins(aE)>toMins(bS);}
function isDriverBusyInFrame(name,date,pickup,drop,excl){
  return requests.some(r=>r.driver===name&&r.date===date&&r.status==='assigned'&&r.id!==excl&&tripsOverlap(pickup,drop,r.pickupTime,r.dropTime));
}

function ini(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}

  var empId=v('f-empid'),name=v('f-name'),from=v('f-from'),to=v('f-to'),date=v('f-date'),pickup=v('f-pickup'),drop=v('f-drop');
  if(!empId||!name||!from||!to||!date||!pickup||!drop){toast('Fill all required (*) fields','err');return;}
  if(toMins(drop)<=toMins(pickup)){toast('Drop time must be after pickup time','err');return;}
  var month=new Date(date).toLocaleString('default',{month:'long'});
  requests.push({id:requests.length+1,empId,name,dept:v('f-dept'),phone:v('f-phone'),from,to,date,pickupTime:pickup,dropTime:drop,notes:v('f-notes'),status:'pending',driver:'',car:'',estKm:0,actualKm:0,endTime:'',driverNotes:'',declineReason:'',month});
  ['f-dept','f-phone','f-from','f-to','f-date','f-pickup','f-drop','f-notes'].forEach(id=>{var el=document.getElementById(id);if(el)el.value='';});
  toast('Request submitted!','ok');
}

function openAssign(id){
  assignTarget=id;var req=requests.find(r=>r.id===id);
  document.getElementById('assign-info').innerHTML=`<div class="info-box">📍 ${req.from} → ${req.to}<br>📅 ${req.date} &nbsp;·&nbsp; 🕐 ${req.pickupTime} – ${req.dropTime}</div>`;
  document.getElementById('a-driver').innerHTML=drivers.map(d=>{
    var busy=isDriverBusyInFrame(d.name,req.date,req.pickupTime,req.dropTime,id);
    return`<option value="${d.name}" class="${busy?'unavailable':'available'}">${busy?'⚠':'✓'} ${d.name}${busy?' — Busy '+req.pickupTime+'-'+req.dropTime:' — Available'}</option>`;
  }).join('');
  document.getElementById('a-car').innerHTML=cars.map(c=>`<option value="${c.reg}">${c.reg} — ${c.model}</option>`).join('');
  document.getElementById('a-km').value='';checkConflict();openModal('assign-modal');
}
function checkConflict(){
  var req=requests.find(r=>r.id===assignTarget);if(!req)return;
  document.getElementById('conflict-warn').style.display=isDriverBusyInFrame(document.getElementById('a-driver').value,req.date,req.pickupTime,req.dropTime,assignTarget)?'block':'none';
}
function confirmAssign(){
  var req=requests.find(r=>r.id===assignTarget);if(!req)return;
  var d=document.getElementById('a-driver').value;
  if(isDriverBusyInFrame(d,req.date,req.pickupTime,req.dropTime,assignTarget)){toast('Driver is busy during this time frame!','err');return;}
  req.status='assigned';req.driver=d;req.car=document.getElementById('a-car').value;
  req.estKm=parseInt(document.getElementById('a-km').value)||0;
  req.month=new Date(req.date).toLocaleString('default',{month:'long'});
  closeModal('assign-modal');renderReqs();toast(`${d} assigned to ${req.empId}`,'ok');
}
function openDecline(id){declineTarget=id;document.getElementById('decline-reason').value='';openModal('decline-modal');}
function confirmDecline(){

}

function filterUsers(type,q){
  var f=q.toLowerCase();
  updateClear('usr-'+(type==='emp'?'emp':'drv')+'-search',q);
  if(type==='emp') renderUserEmpList(employees.filter(e=>e.name.toLowerCase().includes(f)||e.empId.toLowerCase().includes(f)||e.dept.toLowerCase().includes(f)));
  else renderUserDrvList(drivers.filter(d=>d.name.toLowerCase().includes(f)||d.phone.includes(f)));
}
function openEditCred(type,idVal){
  editCredTarget={type,idVal};
  var u=null,label='';
  if(type==='emp'){var e=employees.find(x=>x.empId===idVal);u=USERS.find(x=>x.empId===idVal);label=e?e.name+' ('+idVal+')':'';}
  else{var d=drivers.find(x=>x.id===idVal);u=USERS.find(x=>x.driverId===idVal);label=d?d.name:'';}
  document.getElementById('edit-cred-info').innerHTML=`<div class="info-box">Editing login for: <strong>${label}</strong></div>`;
  document.getElementById('ec-username').value=u?u.username:'';
  document.getElementById('ec-password').value=u?u.password:'';
  openModal('edit-cred-modal');
}
function saveCredentials(){
  var uname=v('ec-username').toLowerCase(),pass=document.getElementById('ec-password').value.trim();
  if(!uname||!pass){toast('Username and password required','err');return;}
  var {type,idVal}=editCredTarget;
  var dup=USERS.find(u=>u.username===uname&&(type==='emp'?u.empId!==idVal:u.driverId!==idVal));
  if(dup){toast('Username already taken','err');return;}
  var u=type==='emp'?USERS.find(x=>x.empId===idVal):USERS.find(x=>x.driverId===idVal);
  if(u){u.username=uname;u.password=pass;}
  else{
    if(type==='emp'){var e=employees.find(x=>x.empId===idVal);if(e)USERS.push({id:'u'+nextUserId++,username:uname,password:pass,role:'employee',displayName:e.name,empId:e.empId,driverId:null});}
    else{var d=drivers.find(x=>x.id===idVal);if(d)USERS.push({id:'u'+nextUserId++,username:uname,password:pass,role:'driver',displayName:d.name,empId:null,driverId:d.id});}
  }
  closeModal('edit-cred-modal');renderUsers();toast('Credentials updated!','ok');
}
function removeEmployee(id){
  if(!confirm('Remove this employee?'))return;
  var e=employees.find(x=>x.id===id);
  employees=employees.filter(x=>x.id!==id);
  if(e)USERS=USERS.filter(u=>u.empId!==e.empId);
  renderUsers();toast('Employee removed','warn');
}
function addEmployee(){
  var name=v('ne-name'),empId=v('ne-empid').toUpperCase(),dept=v('ne-dept'),phone=v('ne-phone');
  var uname=v('ne-username').toLowerCase(),pass=document.getElementById('ne-password').value;
  if(!name||!empId||!uname||!pass){toast('Name, Emp ID, username & password required','err');return;}
  if(employees.find(e=>e.empId===empId)){toast('Employee ID already exists','err');return;}
  if(USERS.find(u=>u.username===uname)){toast('Username already taken','err');return;}
  employees.push({id:nextEmpId++,name,empId,dept,phone});
  USERS.push({id:'u'+nextUserId++,username:uname,password:pass,role:'employee',displayName:name,empId,driverId:null});
  closeModal('add-emp-modal');
  ['ne-name','ne-empid','ne-dept','ne-phone','ne-username','ne-password'].forEach(id=>{var el=document.getElementById(id);if(el)el.value='';});
  renderUsers();toast(name+' added with login','ok');
}

function renderMonthly(){
  var months=[...new Set(requests.filter(r=>r.month).map(r=>r.month))];
  if(!months.length)months=['May'];
  var sel=months[months.length-1];
  setPage(`<div class="ptitle">Monthly Tracking</div><div class="psubtitle">Driver performance breakdown by month</div><div class="month-tabs" id="month-tabs">${months.map(m=>`<div class="mtab${m===sel?' active':''}" onclick="selMonth('${m}',this)">${m}</div>`).join('')}</div><div id="monthly-content"></div>`);
  renderMonthContent(sel);
}
function selMonth(m,el){document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderMonthContent(m);}
function renderMonthContent(month){
  var html=drivers.map(d=>{
    var trips=requests.filter(r=>r.driver===d.name&&r.month===month);if(!trips.length)return'';
    var done=trips.filter(r=>r.status==='completed'),km=done.reduce((s,r)=>s+(r.actualKm||0),0);
    var rows=trips.map(r=>`<div class="trip-row"><span>${r.date} · <span class="emp-id">${r.empId}</span> ${r.name} · ${r.from} → ${r.to} <span class="time-range-badge" style="font-size:9px;padding:1px 6px">🕐 ${r.pickupTime}–${r.dropTime}</span></span><span>${badge(r.status)}${r.actualKm?` <strong>${r.actualKm}km</strong>`:''}</span></div>`).join('');
    return`<div class="dm-card"><div class="dm-header"><div class="avatar">${ini(d.name)}</div><div><div style="font-size:14px;font-weight:700">${d.name}</div><div style="font-size:11px;color:var(--text-secondary)">${d.phone} · ${d.license}</div></div></div><div class="dm-stats"><div class="dm-stat"><div class="dm-stat-label">Assigned</div><div class="dm-stat-val">${trips.length}</div></div><div class="dm-stat"><div class="dm-stat-label">Completed</div><div class="dm-stat-val">${done.length}</div></div><div class="dm-stat"><div class="dm-stat-label">Total KM</div><div class="dm-stat-val">${km}</div></div></div><div style="margin-top:.85rem;border-top:1px solid var(--border);padding-top:.6rem">${rows}</div></div>`;
  }).filter(Boolean).join('');
  document.getElementById('monthly-content').innerHTML=html||`<div class="glass-card"><div class="empty-state"><div class="icon">📅</div><div class="msg">No trips in ${month}</div></div></div>`;
}

// ── REPORTS ───────────────────────────────────────────────────────
function renderReports(){
  var done=requests.filter(r=>r.status==='completed'),km=done.reduce((s,r)=>s+(r.actualKm||0),0),dec=requests.filter(r=>r.status==='declined').length;
  setPage(`
    <div class="ptitle">Reports</div>
    <div class="psubtitle">Fleet performance analytics</div>
    <div class="stats">
      <div class="scard"><div class="scard-accent" style="background:var(--success-grad)"></div><div class="scard-label">Completed Trips</div><div class="scard-val">${done.length}</div></div>
      <div class="scard"><div class="scard-accent" style="background:linear-gradient(90deg,#a855f7,#c084fc)"></div><div class="scard-label">Total KM</div><div class="scard-val">${km}</div></div>
      <div class="scard"><div class="scard-accent" style="background:var(--danger-grad)"></div><div class="scard-label">Declined</div><div class="scard-val">${dec}</div></div>
      <div class="scard"><div class="scard-accent" style="background:var(--accent-grad)"></div><div class="scard-label">Fleet</div><div class="scard-val">${drivers.length}D / ${cars.length}C</div></div>
    </div>
    <div class="glass-card">
      <div class="ctitle">Driver Performance</div>
      <table class="tbl"><thead><tr><th>Driver</th><th>License</th><th>Trips</th><th>Total KM</th><th>Avg KM / Trip</th></tr></thead>
      <tbody>${drivers.map(d=>{var t=done.filter(r=>r.driver===d.name),k=t.reduce((s,r)=>s+(r.actualKm||0),0);return`<tr><td style="font-weight:600">${d.name}</td><td class="emp-id">${d.license}</td><td>${t.length}</td><td>${k}</td><td>${t.length?Math.round(k/t.length):'—'}</td></tr>`;}).join('')}</tbody>
      </table>
    </div>
    <div class="glass-card">
      <div class="ctitle">Car Utilization</div>
      <table class="tbl"><thead><tr><th>Model</th><th>Reg No.</th><th>Colour</th><th>Trips</th><th>Total KM</th></tr></thead>
      <tbody>${cars.map(c=>{var t=done.filter(r=>r.car===c.reg),k=t.reduce((s,r)=>s+(r.actualKm||0),0);return`<tr><td style="font-weight:600">${c.model}</td><td class="emp-id">${c.reg}</td><td><span class="color-dot" style="background:${c.hex};margin-right:6px"></span>${c.color}</td><td>${t.length}</td><td>${k}</td></tr>`;}).join('')}</tbody>
      </table>
    </div>`);
}

render();
</script>
</body>
</html>
